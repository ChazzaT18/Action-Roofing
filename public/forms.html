<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netlify Form Helper</title>
</head>
<body>
    <form name="contact" data-netlify="true" hidden>
        <input type="text" name="full-name" />
        <input type="tel" name="phone-number" />
        <input type="text" name="postcode" />
        <textarea name="message"></textarea>
    </form>
</body>
</html>
